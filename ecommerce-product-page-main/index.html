<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./ecommerce.css" />

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />

    <title>Frontend Mentor | E-commerce product page</title>
  </head>
  <body>
    <main class="main-container">
      <nav class="nav">
        <div class="nav-left">
          <a class="nav-logo" href="#"
            ><img src="./images/logo.svg" alt="sneakers logo"
          /></a>
          <ul class="nav-links">
            <li><a href="#">Collections</a></li>
            <li><a href="#">Men</a></li>
            <li><a href="#">Women</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Contact</a></li>
          </ul>
        </div>
        <div class="nav-right">
          <img src="./images/icon-cart.svg" class="cart-icon" alt="cart icon" />
          <img
            src="./images/image-avatar.png"
            class="avatar-icon"
            alt="avatar icon"
          />
        </div>
      </nav>

      <section class="product-section">
        <div class="product-image-container">
          <img
            src="./images/image-product-1.jpg"
            alt="product image"
            class="product-image"
          />
          <div class="product-thumbnails">
            <img
              src="./images/image-product-1-thumbnail.jpg"
              alt="product thumbnail 1"
              class="thumbnail active-thumb"
            />
            <img
              src="./images/image-product-2-thumbnail.jpg"
              alt="product thumbnail 2"
              class="thumbnail"
            />
            <img
              src="./images/image-product-3-thumbnail.jpg"
              alt="product thumbnail 3"
              class="thumbnail"
            />
            <img
              src="./images/image-product-4-thumbnail.jpg"
              alt="product thumbnail 4"
              class="thumbnail"
            />
          </div>
        </div>
        <div class="product-info">
          <h2 class="company-name">Sneaker Company</h2>
          <h1 class="product-name">Fall Limited Edition Sneakers</h1>
          <p class="product-description">
            These low-profile sneakers are your perfect casual wear companion.
            Featuring a durable rubber outer sole, they'll withstand everything
            the weather can offer.
          </p>
          <div class="price-container">
            <span class="current-price">$125.00</span>
            <span class="discount">50%</span>
            <span class="original-price">$250.00</span>
          </div>
          <div class="add-to-cart-container">
            <div class="quantity-selector">
              <button class="quantity-btn">-</button>
              <span class="quantity">0</span>
              <button class="quantity-btn">+</button>
            </div>
            <button class="add-to-cart-btn">
              <img
                src="./images/icon-cart.svg"
                alt="cart icon"
                class="cart-icon"
              />
              Add to cart
            </button>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
